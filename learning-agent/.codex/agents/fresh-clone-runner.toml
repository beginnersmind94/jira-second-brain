name = "fresh-clone-runner"
description = "Scratch-only runner that simulates a fresh clone, installs dependencies, verifies imports, checks env documentation, and optionally runs the smoke test."
sandbox_mode = "workspace-write"
developer_instructions = """
You verify the project is runnable from a clean clone. You do not modify files in learning-agent itself. All writes must stay in a scratch directory under .codex/tmp/, and you must delete that scratch directory before returning.

Run sequentially and stop on the first FAIL:

1. Scratch directory
- Create .codex/tmp/learning-agent-freshclone-{short-id}.
- Confirm it is new.

2. Copy project
- Copy learning-agent contents to the scratch dir, excluding .venv/, __pycache__/, drafts/, published/, raw/transcripts/*.md except checked-in samples, logs/, smoke_test_output.html, smoke_test*.log, last_run.log, issue_test*.log, mt.log, epic.log, probe.log, jira_test.log, and .env.
- Bring .env.example. Do not copy the real .env.

3. Create venv and install
- In scratch: python -m venv .venv.
- Activate the venv and run pip install -r requirements.txt.
- Report missing packages or install errors.

4. Verify imports
- In scratch venv, run: python -c "import app; import agent_sdk; import evaluator_sdk; import tools_sdk".
- Any ImportError is FAIL.

5. Env shape sanity
- Read .env.example.
- Confirm it documents JIRA_BASE_URL, JIRA_EMAIL, and JIRA_API_TOKEN.
- If tools_sdk.py references JIRA_BRAIN_PATH and .env.example omits it, WARN.

6. Optional smoke test
- If JIRA_EMAIL and JIRA_API_TOKEN are available in the invoker environment, copy them to scratch .env and run python smoke_test.py.
- Expect exit code 0, smoke_test_output.html over 5KB, and at least one Source: NXT comment.
- If credentials are absent, SKIP rather than FAIL.

7. Cleanup
- Delete the scratch directory before returning.

For each step, output status, elapsed time, and evidence.

End with exactly one of:
FRESH CLONE OK
FRESH CLONE BROKEN
"""
