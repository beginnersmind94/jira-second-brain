function viewAccess(){
  const sup=isSuper();
  let h=`<p class="note" style="margin-bottom:14px">${SVG.shield} <b>Assignment is the access control.</b> A person outside a viewer's assigned scope never appears in any view, search, drill-down, or export — this is what keeps each district's staff PII walled off. Access is <b>deny-by-default</b>: a director sees only what's explicitly assigned or inherited.</p>`;

  // scope demonstrator (2.3)
  const inScopeN=scopedRoster().length; const d=currentDir();
  h+=`<div class="scope-readout" id="scope-readout">
    <span class="sr-n">${inScopeN}</span><span class="sr-l">of ${TOTAL_STAFF} staff<br>in scope</span>
    <span class="sr-who">Previewing as<br><b>${esc(d.name)}</b><br>${esc(d.scope.sites==='ALL'&&d.scope.roles==='ALL'?'full district':scopeIsEmpty(d.scope)?'no scope yet':'scoped')}</span></div>`;
  h+=`<p class="small muted" style="margin:-4px 4px 16px"><b>Preview as</b> (top right) is a read-only lens — it shows the product through another supervisor's scope without acting as them; every dashboard, grid, report and export narrows with it. ${scopeIsEmpty(d.scope)?'<b>This supervisor has no scope yet — they see nothing, not everything.</b>':''}</p>`;

  // onboarding inheritance (2.2)
  h+=`<div class="card"><div class="dir-card"><div class="da">${SVG.sync}</div><div class="db">
    <div class="dn">Seeded from onboarding</div>
    <div class="dt">Roles and site assignments configured at onboarding seed LMS scope in bulk — no re-entry. Manual edits override the inherited value per user.</div></div>
    <div class="dright"><button class="btn btn--secondary btn--sm" ${sup?'':'disabled'} onclick="App.reseed()">${SVG.sync} Re-seed from onboarding</button></div></div>
    <div class="card-b" style="padding-top:0"><div class="oq"><span class="oqi">Open Q</span><span>Where the onboarding role/site config lives, and whether the LMS can read it (#5). With no config available, this falls back to manual assignment — nothing is inherited or assumed; inherited values referencing an unknown site/role are flagged for review, not applied silently.</span></div></div></div>`;

  // directors list (2.1)
  h+=`<div class="sec-title">Supervisors &amp; their scope${sup?'':' <span class="st-right" style="color:var(--warn-text)">read-only — not a super-admin</span>'}</div>`;
  h+=`<div class="list">`+DIRECTORS.filter(dir=>!dir.reviewer).map(dir=>{
    const sc=dir.scope; const full=sc.sites==='ALL'&&sc.roles==='ALL'; const empty=scopeIsEmpty(sc);
    const siteChips = sc.sites==='ALL' ? `<span class="scope-chip all">${SVG.check} All sites</span>` : (sc.sites.length?sc.sites.map(s=>`<span class="scope-chip">${esc(s)}</span>`).join(''):'');
    const roleChips = sc.roles==='ALL' ? `<span class="scope-chip all">${SVG.check} All roles</span>` : (sc.roles.length?sc.roles.map(r=>`<span class="scope-chip">${esc(r)}</span>`).join(''):'');
    const chips = empty ? `<span class="scope-chip" style="color:var(--warn-text)">No scope assigned — sees nothing</span>` : siteChips+roleChips;
    const badge = dir.super ? '' : `<span class="seed-badge ${dir.inherited?'inherited':'manual'}">${dir.inherited?'inherited':'manual override'}</span>`;
    return `<div class="dir-card"><div class="da">${initials(dir.name)}</div><div class="db">
      <div class="dn">${esc(dir.name)} ${dir.super?'<span class="scope-chip all" style="padding:3px 9px">super-admin</span>':badge}</div>
      <div class="dt">${esc(dir.title)}${dir.super?' · single-admin default: full district scope':''}</div>
      <div class="scope-chips">${chips}</div></div>
      <div class="dright">${dir.super?'<span class="small muted">full access</span>':`<button class="btn btn--secondary btn--sm" ${sup?'':'disabled'} onclick="App.editScope('${dir.id}')">${SVG.edit} Edit scope</button>`}</div></div>`;
  }).join('')+`</div>`;
  if(!sup) h+=`<p class="note">${SVG.shield} Only a super-admin can change scope assignments — these controls are disabled in this scoped preview, and any attempt is blocked. No one can widen their own access.</p>`;
  else h+=`<p class="note">A super-admin assigns each supervisor their sites and roles. Assigning a site or role that doesn't exist is blocked; a single-admin district defaults to full scope without assigning anything to themselves.</p>`;
  h+=`<div class="sec-title">Reviewer access</div>
    <div class="card"><div class="dir-card"><div class="da">${SVG.doc}</div><div class="db"><div class="dn">State agency reviewer</div><div class="dt">Single-district read-only access to training evidence reports and completion records. No roster, assignment, or requirement edits are allowed.</div><div class="scope-chips"><span class="scope-chip all">${SVG.check} ${DISTRICT} only</span><span class="scope-chip">${SVG.shield} Read-only</span></div></div><div class="dright"><button class="btn btn--secondary btn--sm" onclick="App.setViewingAs('reviewer');App.setTab('reports')">Preview reviewer</button></div></div></div>`;
  return h;
}
App.reseed=()=>{ if(!isSuper()) return;
  DIRECTORS.forEach(d=>{ const def=DEFAULT_SCOPES.find(x=>x.id===d.id); if(def){ d.scope=JSON.parse(JSON.stringify(def.scope)); d.inherited=def.inherited; } });
  commit('Re-seeded scope from the onboarding configuration. Manual overrides were reset to the inherited values.'); };
App.editScope=id=>{ if(!isSuper()) return; const dir=dirById(id);
  const sc=dir.scope; const selSites = sc.sites==='ALL'?[...SITES]:[...sc.sites]; const selRoles = sc.roles==='ALL'?[...KNOWN_ROLES]:[...sc.roles];
  state._scopeEdit={id, sites:new Set(selSites), roles:new Set(selRoles), allSites:sc.sites==='ALL', allRoles:sc.roles==='ALL'};
  openModal('Edit scope — '+dir.name, scopeEditBody(), null, ()=>{state._scopeEdit=null;}, ()=>({body:scopeEditBody(), footer:scopeEditFooter()})); };
function scopeEditBody(){ const e=state._scopeEdit; if(!e) return '';
  const siteChip=s=>`<button class="chip" aria-pressed="${!e.allSites&&e.sites.has(s)}" onclick="App.scopeToggle('site','${esc(s)}')">${esc(s)}</button>`;
  const roleChip=r=>`<button class="chip" aria-pressed="${!e.allRoles&&e.roles.has(r)}" onclick="App.scopeToggle('role','${esc(r)}')">${esc(r)}</button>`;
  return `<p class="small muted" style="margin:0 0 14px">Pick the sites and roles this supervisor monitors. Saving sets a <b>manual override</b>. Deny-by-default — they see only what's selected here.</p>
    <div class="filter-group" style="margin-bottom:14px"><span class="fg-label">Sites <button class="btn btn--ghost btn--sm" onclick="App.scopeAll('site')">${e.allSites?'✓ ':''}All sites</button></span><div class="chips">${SITES.map(siteChip).join('')}</div></div>
    <div class="filter-group"><span class="fg-label">Roles <button class="btn btn--ghost btn--sm" onclick="App.scopeAll('role')">${e.allRoles?'✓ ':''}All roles</button></span><div class="chips">${KNOWN_ROLES.map(roleChip).join('')}</div></div>
    <div class="oq"><span class="oqi">Note</span><span>Only known sites/roles can be selected — assigning a value that doesn't exist is blocked by construction.</span></div>`;
}
function scopeEditFooter(){ const e=state._scopeEdit; const empty = !e.allSites&&e.sites.size===0 || !e.allRoles&&e.roles.size===0;
  return `<button class="btn btn--secondary" onclick="closeModal()">Cancel</button><button class="btn btn--primary" style="flex:1" onclick="App.saveScope()">${SVG.check} Save scope</button>`; }
App.scopeToggle=(g,v)=>{ const e=state._scopeEdit; if(g==='site'){ e.allSites=false; e.sites.has(v)?e.sites.delete(v):e.sites.add(v); } else { e.allRoles=false; e.roles.has(v)?e.roles.delete(v):e.roles.add(v); } refreshTopModal(); };
App.scopeAll=g=>{ const e=state._scopeEdit; if(g==='site'){ e.allSites=!e.allSites; if(e.allSites) e.sites=new Set(SITES); } else { e.allRoles=!e.allRoles; if(e.allRoles) e.roles=new Set(KNOWN_ROLES); } refreshTopModal(); };
App.saveScope=()=>{ const e=state._scopeEdit; const dir=dirById(e.id);
  dir.scope = { sites: e.allSites?'ALL':[...e.sites], roles: e.allRoles?'ALL':[...e.roles] };
  dir.inherited=false; state._scopeEdit=null; closeModal();
  commit(`Scope updated for ${dir.name} (manual override). Their views now show only the assigned staff.`); };

/* ============================ MODAL STACK ============================ */
let modalStack=[];
function focusSoon(sel){ setTimeout(()=>{ const e=$(sel); if(e)e.focus(); },20); }
function openModal(title, body, footer, onClose, render){
  modalStack.push({title, body, footer:footer||null, onClose:onClose||null, render:render||null, lastFocus:document.activeElement});
  paintModal();
}
function paintModal(){
  const f=modalStack[modalStack.length-1]; if(!f) return;
  if(f.render){ const o=f.render(); f.body=o.body; if(o.footer!==undefined) f.footer=o.footer; }
  document.body.classList.add('modal-open');
  const back = modalStack.length>1 ? `<button class="modal-back" onclick="closeModal()" aria-label="Back">${SVG.back}</button>` : '';
  $('#modal-root').innerHTML=`<div class="modal-bd" id="mbd"><div class="modal" role="dialog" aria-modal="true" aria-label="${esc(f.title)}">
    <div class="modal-h">${back}<h2>${esc(f.title)}</h2><button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button></div>
    <div class="modal-b" id="modal-b">${f.body}</div>${f.footer?`<div class="modal-f">${f.footer}</div>`:''}</div></div>`;
  const bd=$('#mbd'); bd.addEventListener('click',e=>{ if(e.target===bd) closeModal(); });
  const c=bd.querySelector('.modal-close'); if(c) c.focus();
}
function refreshTopModal(){ const f=modalStack[modalStack.length-1]; if(!f) return;
  if(f.render){ const o=f.render(); f.body=o.body; if(o.footer!==undefined) f.footer=o.footer; }
  const mb=$('#modal-b'); if(mb) mb.innerHTML=f.body;
  const mf=document.querySelector('#mbd .modal-f'); if(f.footer && mf) mf.innerHTML=f.footer; }
function closeModal(){ const f=modalStack.pop(); if(f && f.onClose) f.onClose();
  if(modalStack.length){ paintModal(); }
  else { $('#modal-root').innerHTML=''; document.body.classList.remove('modal-open'); if(f && f.lastFocus && f.lastFocus.focus){ try{ f.lastFocus.focus(); }catch(e){} } } }
function closeAllModals(){ while(modalStack.length){ const f=modalStack.pop(); if(f&&f.onClose) f.onClose(); } $('#modal-root').innerHTML=''; document.body.classList.remove('modal-open'); }
window.closeModal=closeModal;

document.addEventListener('keydown',function(e){
  if(tourActive()){ if(e.key==='Escape'){ e.preventDefault(); endTour(); } return; }
  if(!modalStack.length) return;
  if(e.key==='Escape'){ e.preventDefault(); closeModal(); return; }
  if(e.key==='Tab'){ const m=$('#mbd'); if(!m)return; const f=[...m.querySelectorAll('button,select,input,textarea,[tabindex]')].filter(x=>!x.disabled&&x.offsetParent!==null); if(!f.length)return;
    const first=f[0],last=f[f.length-1]; if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); } else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); } } });

document.getElementById('tabbar').addEventListener('keydown',e=>{ if(e.key!=='ArrowRight'&&e.key!=='ArrowLeft')return;
  const btns=[...$('#tabbar').querySelectorAll('button')], i=btns.indexOf(document.activeElement); if(i<0)return; e.preventDefault();
  const n=e.key==='ArrowRight'?(i+1)%btns.length:(i-1+btns.length)%btns.length; btns[n].focus(); btns[n].click(); });

/* ============================ COVER + WALKTHROUGH ============================ */
function tourSeen(){ try{ return !!sessionStorage.getItem('das_tour_seen'); }catch(e){ return false; } }
function markTourSeen(){ try{ sessionStorage.setItem('das_tour_seen','1'); }catch(e){} }
function enterApp(){ $('#cover').classList.add('hide'); $('#app').style.display='flex';
  renderTabs(); fillViewAs(); App.render();
  // auto-run the walkthrough only the first time this browser session; reloads won't re-fire it (Replay is in the header).
  setTimeout(()=>{ state.loading=false; App.render(); if(!tourSeen()) setTimeout(()=>startTour(),350); },500); }

const TOUR_PERSON='stf-1015'; // Desmond Achebe — completed New Cashier Onboarding (cited + dated)
const TOUR=[
  { tab:'dashboard', prep:()=>{ closeAllModals(); state.notifyDismissed=false; state.dashboardFilter={site:'all',role:'all'}; state.drill={site:null,role:null}; }, target:()=>$('#site-bars'), cap:'Completion across every site, worst-first.' },
  { tab:'dashboard', prep:()=>{ closeAllModals(); state.drill={site:'Heights High',role:'POS Cashier'}; }, target:()=>$('#drill-individuals'), cap:'Down to the site, the role, the person.' },
  { prep:()=>{ closeAllModals(); App.openPerson(TOUR_PERSON); }, target:()=>$('#rec-cited')||$('#modal-b'), cap:'Each completion, cited and dated.' },
  { tab:'roster', prep:()=>{ closeAllModals(); }, target:()=>$('#roster-actions'), cap:'Imported and managed by the district. One shared list.' },
  { tab:'access', prep:()=>{ closeAllModals(); state.viewingAs='reuben'; }, target:()=>$('#scope-readout'), cap:'Scope decides who sees whom.' },
  { closing:true },
];
let tourIdx=-1;
function tourActive(){ return tourIdx>=0; }
function startTour(){ markTourSeen(); tourReset(); tourIdx=0; tourShow(); }
function tourReset(){ closeAllModals(); state.viewingAs='dana'; state.dashboardFilter={site:'all',role:'all'}; state.drill={site:null,role:null}; state.notifyDismissed=false; document.body.classList.add('tour-on'); fillViewAs(); }
function endTour(){ tourIdx=-1; document.body.classList.remove('tour-on'); $('#tour-root').classList.remove('on'); $('#tour-root').innerHTML='';
  closeAllModals(); state.viewingAs='dana'; state.dashboardFilter={site:'all',role:'all'}; state.drill={site:null,role:null}; state.tab='dashboard'; renderTabs(); fillViewAs(); App.render(); }
function tourNext(){ if(tourIdx>=TOUR.length-1){ endTour(); return; } tourIdx++; tourShow(); }
function tourBack(){ if(tourIdx<=0) return; tourIdx--; tourShow(); }
function tourShow(){ const beat=TOUR[tourIdx]; if(!beat){ endTour(); return; }
  if(beat.closing){ showClosing(); return; }
  if(beat.tab){ state.tab=beat.tab; renderTabs(); }
  if(beat.prep) beat.prep();
  fillViewAs(); App.render();
  requestAnimationFrame(()=>setTimeout(()=>positionSpot(beat),50)); }
window.startTour=startTour; window.tourNext=tourNext; window.tourBack=tourBack; window.endTour=endTour; window.enterApp=enterApp;

function positionSpot(beat){
  const root=$('#tour-root'); root.classList.add('on');
  const el = beat.target ? beat.target() : null;
  if(el && el.scrollIntoView){ try{ el.scrollIntoView({block:'center', inline:'nearest'}); }catch(_){ } }
  const vw=innerWidth, vh=innerHeight, pad=8;
  let html='';
  let holeY=null, holeH=null, holeX=0, holeW=vw;
  if(el){ const r=el.getBoundingClientRect();
    const x=Math.max(4,r.left-pad), y=Math.max(4,r.top-pad), w=Math.min(vw-4,r.right+pad)-x, h=Math.min(vh-4,r.bottom+pad)-y;
    holeX=x; holeY=y; holeW=w; holeH=h;
    html += `<div class="tour-dim" style="left:0;top:0;width:${vw}px;height:${y}px"></div>`;
    html += `<div class="tour-dim" style="left:0;top:${y+h}px;width:${vw}px;height:${Math.max(0,vh-(y+h))}px"></div>`;
    html += `<div class="tour-dim" style="left:0;top:${y}px;width:${x}px;height:${h}px"></div>`;
    html += `<div class="tour-dim" style="left:${x+w}px;top:${y}px;width:${Math.max(0,vw-(x+w))}px;height:${h}px"></div>`;
    html += `<div class="tour-ring" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px"></div>`;
  } else {
    html += `<div class="tour-dim" style="left:0;top:0;width:${vw}px;height:${vh}px"></div>`;
  }
  root.innerHTML = html + captionCard(beat, holeX, holeY, holeW, holeH, vw, vh);
}
function captionCard(beat, x, y, w, h, vw, vh){
  const step=tourIdx+1, total=TOUR.filter(b=>!b.closing).length;
  const capW=Math.min(330, vw-24);
  let left, top;
  if(y==null){ left=(vw-capW)/2; top=vh*0.62; }
  else {
    left = Math.min(Math.max(12, x + (w-capW)/2), vw-capW-12);
    const below = y+h+16, estH=176;
    top = (below+estH < vh) ? below : Math.max(12, y-estH-16);
  }
  return `<div class="tour-cap" role="dialog" aria-live="polite" aria-label="Walkthrough step ${step} of ${total}" style="left:${left}px;top:${top}px;width:${capW}px">
    <div class="tc-step">Step ${step} of ${total}</div>
    <div class="tc-cap">${esc(beat.cap)}</div>
    <div class="tc-ctrls">
      <button class="tcb ghost" onclick="tourBack()" ${tourIdx===0?'disabled':''}>Back</button>
      <button class="tcb ghost" onclick="endTour()">Skip</button>
      <span class="tc-spacer"></span>
      <button class="tcb next" onclick="tourNext()">${tourIdx>=total-1?'Finish':'Next'}</button>
    </div></div>`;
}
function showClosing(){ const root=$('#tour-root'); root.classList.add('on');
  root.innerHTML=`<div class="tour-dim" style="left:0;top:0;width:100vw;height:100vh"></div>
    <div class="tour-close-card"><div class="tour-close-inner" role="dialog" aria-label="Walkthrough complete">
      <h3>Walkthrough complete</h3>
      <div class="tci-row"><button class="btn btn--primary" onclick="endTour()">Explore on your own &rarr;</button>
      <button class="btn btn--secondary" onclick="startTour()">Replay</button></div></div></div>`; }
window.addEventListener('resize', ()=>{ if(tourActive()){ const beat=TOUR[tourIdx]; if(beat && !beat.closing) positionSpot(beat); } });

/* read-only hook for headless QA */
window.__proto={ state, ROSTER, CATALOG, DIRECTORS, completionSummary:()=>completionSummary(scopedRoster()), scopedCount:()=>scopedRoster().length, dashboardFilteredCount:()=>dashboardFilteredRows().length, staffStatus, asgStatus, staffById, groupPct:(fn)=>groupPct(scopedRoster(),fn), modalDepth:()=>modalStack.length, tourIdx:()=>tourIdx };
</script>
</body>
