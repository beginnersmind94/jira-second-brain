[pytest]
# _temp_hold/ is an untracked scratch / holding area (parked prototypes, removed
# certs, pending Jira artifacts). It contains a duplicate test_tenancy.py that
# collides with tests/test_tenancy.py — same top-level module name, neither dir is
# a package, so pytest raises an "import file mismatch" error during collection.
# Excluding it from recursion fixes collection without an --ignore on the CLI.
# The list below is pytest's default norecursedirs plus _temp_hold (setting this
# key replaces the default, so the defaults are repeated here on purpose).
norecursedirs = _temp_hold *.egg .* _darcs build CVS dist node_modules venv {arch}
